name: Release

# Builds a signed release APK and attaches it to a GitHub Release when a version
# tag (v*) is pushed. Signing is driven by four repo secrets (see
# docs/RELEASING.md); the with-android-signing config plugin wires them into the
# generated Gradle project at prebuild time.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the Release and upload the APK asset

jobs:
  release-apk:
    name: Signed release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      # Fail early with a clear message if the signing secrets aren't set, rather
      # than deep inside a Gradle signing error.
      - name: Verify signing secrets are configured
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=
          [ -n "$KS" ] || missing="$missing ANDROID_KEYSTORE_BASE64"
          [ -n "$KS_PW" ] || missing="$missing ANDROID_KEYSTORE_PASSWORD"
          [ -n "$KEY_ALIAS" ] || missing="$missing ANDROID_KEY_ALIAS"
          [ -n "$KEY_PW" ] || missing="$missing ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required signing secrets:$missing — see docs/RELEASING.md"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - run: npm install --legacy-peer-deps

      # Regenerates android/ and runs the config plugins, including
      # with-android-signing (which points the release build type at the upload
      # keystore when the VESTA_UPLOAD_* Gradle properties are present).
      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      # Same heap bump as CI — packageRelease needs it too.
      - name: Raise Gradle heap
        working-directory: apps/mobile/android
        run: echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> gradle.properties

      # storeFile is resolved relative to the app module, so decode into app/.
      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > android/app/release.keystore

      - name: Assemble signed release APK
        working-directory: apps/mobile/android
        env:
          # Gradle reads ORG_GRADLE_PROJECT_x as project property x — no
          # passwords on the command line, no writing them to a file.
          ORG_GRADLE_PROJECT_VESTA_UPLOAD_STORE_FILE: release.keystore
          ORG_GRADLE_PROJECT_VESTA_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_VESTA_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_VESTA_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Name the APK after the tag
        working-directory: apps/mobile/android
        env:
          TAG: ${{ github.ref_name }}
        run: cp app/build/outputs/apk/release/app-release.apk "../vesta-${TAG}.apk"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/vesta-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      # Never leave the decoded keystore on the runner (belt-and-suspenders;
      # runners are ephemeral).
      - name: Remove decoded keystore
        if: always()
        run: rm -f android/app/release.keystore
